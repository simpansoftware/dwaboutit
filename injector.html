<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">
    <title>Iframe Injector</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background: #000;
        }

```
    /* Fullscreen iframe */
    iframe {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
        z-index: 0;
    }

    /* Overlay panel */
    #panel {
        position: fixed;
        top: 10px;
        left: 10px;
        width: 300px;
        background: rgba(20, 20, 20, 0.9);
        color: #eee;
        padding: 10px;
        border: 1px solid #444;
        z-index: 10;
    }

    input, textarea {
        width: 100%;
        margin-bottom: 8px;
        background: #222;
        color: #eee;
        border: 1px solid #444;
        padding: 6px;
    }

    button {
        width: 100%;
        padding: 8px;
        background: #0a84ff;
        color: white;
        border: none;
        cursor: pointer;
    }

    #toggle {
        margin-top: 5px;
        background: #555;
    }
</style>
```

</head>
<body>

<div id="panel">
    <b>Injector</b><br>

```
<input id="url" placeholder="Enter URL...">

<textarea id="code" rows="5" placeholder="Enter JS..."></textarea>

<button onclick="loadAndInject()">Load + Inject</button>
<button id="toggle" onclick="togglePanel()">Hide Panel</button>
```

</div>

<iframe id="frame"></iframe>

<script>
function loadAndInject() {
    const url = document.getElementById("url").value;
    const code = document.getElementById("code").value;
    const iframe = document.getElementById("frame");

    iframe.src = url;

    iframe.onload = () => {
        try {
            const win = iframe.contentWindow;

            // eval
            if (code.trim()) {
                win.eval(code);

                const script = win.document.createElement("script");
                script.textContent = code;
                win.document.body.appendChild(script);
            }

            console.log("Injected");
        } catch (e) {
            console.error("Injection failed:", e);
        }
    };
}

function togglePanel() {
    const panel = document.getElementById("panel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
