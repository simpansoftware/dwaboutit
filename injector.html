<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Injector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      background: #0d0d0d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 0;
    }

    #panel {
      position: fixed;
      top: 14px;
      left: 14px;
      width: 300px;
      background: rgba(18, 18, 18, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 14px;
      z-index: 10;
      color: #e0e0e0;
    }

    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    #panel-header span {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
    }

    #toggle {
      font-size: 11px;
      padding: 3px 8px;
      background: rgba(255,255,255,0.07);
      color: #aaa;
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #toggle:hover { background: rgba(255,255,255,0.12); color: #ddd; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #666;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .field { margin-bottom: 10px; }

    input[type="text"], textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      color: #e0e0e0;
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 7px 9px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
    }
    input[type="text"]:focus, textarea:focus {
      border-color: rgba(255,255,255,0.25);
    }
    input[type="text"]::placeholder, textarea::placeholder {
      color: #444;
    }

    textarea { font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; }

    #run-btn {
      width: 100%;
      padding: 8px;
      background: #1a6bff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    #run-btn:hover { background: #2a7aff; }
    #run-btn:active { transform: scale(0.98); }

    #status {
      font-size: 11px;
      color: #555;
      margin-top: 8px;
      min-height: 14px;
    }
    #status.ok { color: #4caf82; }
    #status.err { color: #e05555; }
  </style>
</head>
<body>

<div id="panel">
  <div id="panel-header">
    <span>Injector</span>
    <button id="toggle" onclick="togglePanel()">Hide</button>
  </div>

  <div class="field">
    <label>URL</label>
    <input type="text" id="url" placeholder="https://example.com">
  </div>

  <div class="field">
    <label>JavaScript</label>
    <textarea id="code" rows="5" placeholder="document.body.style.background = 'red'"></textarea>
  </div>

  <button id="run-btn" onclick="loadAndInject()">Load + Inject</button>
  <div id="status"></div>
</div>

<iframe id="frame"></iframe>

<script>
  function loadAndInject() {
    const url = document.getElementById("url").value.trim();
    const code = document.getElementById("code").value.trim();
    const iframe = document.getElementById("frame");
    const status = document.getElementById("status");

    if (!url) { setStatus("Enter a URL first.", "err"); return; }

    setStatus("Loading…", "");
    iframe.src = url;

    iframe.onload = () => {
      try {
        const win = iframe.contentWindow;
        if (code) {
          win.eval(code);
          const s = win.document.createElement("script");
          s.textContent = code;
          win.document.body.appendChild(s);
        }
        setStatus("Injected.", "ok");
      } catch (e) {
        setStatus("Blocked: " + e.message, "err");
      }
    };
  }

  function togglePanel() {
    const panel = document.getElementById("panel");
    const btn = document.getElementById("toggle");
    const body = document.getElementById("panel").querySelector("#panel-header + *");
    const isCollapsed = panel.dataset.collapsed === "1";

    if (isCollapsed) {
      panel.style.height = "";
      panel.style.overflow = "";
      panel.dataset.collapsed = "0";
      btn.textContent = "Hide";
      Array.from(panel.children).forEach((el, i) => { if (i > 0) el.style.display = ""; });
    } else {
      Array.from(panel.children).forEach((el, i) => { if (i > 0) el.style.display = "none"; });
      panel.dataset.collapsed = "1";
      btn.textContent = "Show";
    }
  }

  function setStatus(msg, cls) {
    const s = document.getElementById("status");
    s.textContent = msg;
    s.className = cls;
  }
</script>

</body>
</html>
